[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "SIM", # flake8-simplify
    "D",   # pydocstyle (PEP 257)
]
ignore = [
    "E501", # line too long, handled by formatter
]

[tool.ruff.lint.pydocstyle]
convention = "pep257"

[tool.ruff.lint.isort]
known-first-party = ["custom_components.ambeo_soundbar"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
